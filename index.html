<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새롬이의 시간표 위젯</title>
    
    <!-- PWA 설정을 위한 메타 태그 (개념 출처: W3C Web App Manifest) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="새롬 시간표">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/whale.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px; 
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
        .day-btn.active {
            background-color: #007aff;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
            transform: translateY(-2px);
        }
        .period-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .period-card.active-now {
            border: 3px solid #007aff;
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0, 122, 255, 0.15);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <!-- Header Section (위젯 느낌을 위해 더 큼직하게) -->
    <div class="w-full max-w-2xl mb-10">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 id="school-title" class="text-4xl md:text-5xl font-black text-gray-900 tracking-tight mb-2">🐋 새롬이의 시간표</h1>
                <p id="current-date-display" class="text-lg md:text-xl text-gray-600 font-semibold">날짜 정보를 불러오는 중...</p>
            </div>
            <div class="text-right">
                <div id="status-dot" class="inline-block w-3 h-3 rounded-full bg-yellow-500 mb-1"></div>
                <div id="update-timestamp" class="text-xs text-gray-400 font-bold uppercase tracking-widest">CONNECTING</div>
            </div>
        </div>
    </div>

    <!-- Day Selector (버튼 크기 확대) -->
    <div class="flex space-x-3 mb-10 w-full max-w-2xl overflow-x-auto no-scrollbar py-2">
        <button onclick="changeDay('월')" id="btn-월" class="day-btn flex-shrink-0 w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-3xl bg-white shadow-sm font-black text-xl md:text-2xl transition-all">월</button>
        <button onclick="changeDay('화')" id="btn-화" class="day-btn flex-shrink-0 w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-3xl bg-white shadow-sm font-black text-xl md:text-2xl transition-all">화</button>
        <button onclick="changeDay('수')" id="btn-수" class="day-btn flex-shrink-0 w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-3xl bg-white shadow-sm font-black text-xl md:text-2xl transition-all">수</button>
        <button onclick="changeDay('목')" id="btn-목" class="day-btn flex-shrink-0 w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-3xl bg-white shadow-sm font-black text-xl md:text-2xl transition-all">목</button>
        <button onclick="changeDay('금')" id="btn-금" class="day-btn flex-shrink-0 w-16 h-16 md:w-20 md:h-20 flex items-center justify-center rounded-3xl bg-white shadow-sm font-black text-xl md:text-2xl transition-all">금</button>
    </div>

    <!-- Timetable List (카드 크기 및 내부 텍스트 확대) -->
    <div id="timetable-list" class="w-full max-w-2xl space-y-6">
        <div class="glass p-10 animate-pulse flex items-center space-x-6">
            <div class="rounded-full bg-gray-200 h-16 w-16"></div>
            <div class="flex-1 space-y-4">
                <div class="h-6 bg-gray-200 rounded w-3/4"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
            </div>
        </div>
    </div>

    <!-- Footer Information -->
    <div class="mt-12 text-gray-500 text-sm font-medium text-center leading-relaxed">
        <span class="bg-white/50 px-3 py-1 rounded-full border border-white/30">
            📊 구글 스프레드시트 실시간 동기화 중
        </span>
        <div class="mt-3 opacity-60">
            45분 수업 · 10분 휴식 · 점심시간 50분 기준
        </div>
    </div>

    <script>
        const SHEET_ID = '1vScVFk_W8kiRU2pQhCIhr32LNR51AZKunJke7RlOdao'; 
        const SHEET_NAME = '시간표 위젯 정보 확장 및 UI 개선'; 
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        const PERIOD_TIMES = [
            { period: 1, start: "09:00", end: "09:45" },
            { period: 2, start: "09:55", end: "10:40" },
            { period: 3, start: "10:50", end: "11:35" },
            { period: 4, start: "11:45", end: "12:30" },
            { period: 5, start: "13:20", end: "14:05" },
            { period: 6, start: "14:15", end: "15:00" },
            { period: 7, start: "15:10", end: "15:55" }
        ];

        let masterData = [];
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        let selectedDay = days[new Date().getDay()];
        if (selectedDay === '일' || selectedDay === '토') selectedDay = '월';

        window.onload = async () => {
            updateDateUI();
            await loadSheetData();
            renderTimetable();
            setInterval(() => { updateDateUI(); renderTimetable(); }, 60000);
        };

        function updateDateUI() {
            const now = new Date();
            document.getElementById('current-date-display').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]}요일)`;
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${selectedDay}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        async function loadSheetData() {
            try {
                const response = await fetch(JSON_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                masterData = json.table.rows.map(row => ({
                    day: row.c[0]?.v,
                    period: row.c[1]?.v,
                    subject: row.c[2]?.v,
                    teacher: row.c[3]?.v,
                    location: row.c[4]?.v
                }));
                document.getElementById('update-timestamp').innerText = `LIVE UPDATED`;
                document.getElementById('status-dot').className = "inline-block w-3 h-3 rounded-full bg-green-500 mb-1";
            } catch (e) {
                document.getElementById('update-timestamp').innerText = `OFFLINE MODE`;
                document.getElementById('status-dot').className = "inline-block w-3 h-3 rounded-full bg-red-500 mb-1";
            }
        }

        function getCurrentPeriod() {
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            for (const item of PERIOD_TIMES) {
                const [sh, sm] = item.start.split(':').map(Number);
                const [eh, em] = item.end.split(':').map(Number);
                if (current >= sh * 60 + sm && current <= eh * 60 + em) return item.period;
            }
            return null;
        }

        function renderTimetable() {
            const container = document.getElementById('timetable-list');
            container.innerHTML = "";
            const filtered = masterData.filter(item => item.day === selectedDay);
            const currentP = (selectedDay === days[new Date().getDay()]) ? getCurrentPeriod() : null;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="glass p-20 text-center text-xl text-gray-500 font-bold">😴 오늘은 수업이 없습니다.</div>`;
                return;
            }

            filtered.sort((a, b) => a.period - b.period).forEach(item => {
                const active = item.period === currentP;
                const time = PERIOD_TIMES.find(t => t.period === item.period);
                const card = document.createElement('div');
                card.className = `period-card glass p-8 flex items-center ${active ? 'active-now' : ''}`;
                card.innerHTML = `
                    <div class="w-20 flex flex-col items-center justify-center border-r-2 border-gray-100 mr-8">
                        <span class="text-4xl md:text-5xl font-black ${active ? 'text-blue-600' : 'text-gray-300'}">${item.period}</span>
                        <span class="text-xs text-gray-400 font-black uppercase mt-2 tracking-tighter">PERIOD</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-2xl md:text-3xl font-black text-gray-800 tracking-tight">${item.subject || '과목명'}</h3>
                            ${active ? '<span class="flex items-center text-xs font-bold text-blue-600 bg-blue-100 px-3 py-1.5 rounded-full pulse">● NOW</span>' : ''}
                        </div>
                        <div class="text-base md:text-lg text-gray-500 font-semibold flex items-center space-x-4">
                            <span>👤 ${item.teacher || '-'}</span>
                            <span class="text-gray-300">|</span>
                            <span>📍 ${item.location || '-'}</span>
                        </div>
                        ${time ? `<div class="text-sm text-blue-400 mt-4 font-bold font-mono tracking-widest">${time.start} — ${time.end}</div>` : ''}
                    </div>`;
                container.appendChild(card);
            });
        }

        function changeDay(day) { selectedDay = day; updateDateUI(); renderTimetable(); }
    </script>
</body>
</html>

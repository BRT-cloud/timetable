<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>새롬이의 시간표 위젯</title>
    
    <!-- PWA 설정을 위한 메타 태그 (개념 출처: W3C Web App Manifest) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="새롬 시간표">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/whale.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px; 
        }
        .day-btn.active {
            background-color: #007aff;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .period-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .period-card.active-now {
            border: 2px solid #007aff;
            background: rgba(0, 122, 255, 0.05);
            transform: scale(1.02);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div class="w-full max-w-md mb-8">
        <div class="flex justify-between items-start mb-2">
            <div>
                <h1 id="school-title" class="text-3xl font-extrabold text-gray-900 tracking-tight">🐋 새롬이의 시간표</h1>
                <p id="current-date-display" class="text-gray-600 font-medium mt-1">로딩 중...</p>
            </div>
            <div class="text-right">
                <div id="status-dot" class="inline-block w-2 h-2 rounded-full bg-yellow-500 mb-1"></div>
                <div id="update-timestamp" class="text-[10px] text-gray-400 uppercase tracking-wider">연결 중</div>
            </div>
        </div>
    </div>

    <!-- 요일 선택 -->
    <div class="flex space-x-2 mb-8 w-full max-w-md overflow-x-auto no-scrollbar py-2">
        <button onclick="changeDay('월')" id="btn-월" class="day-btn flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-2xl bg-white shadow-sm font-bold text-lg">월</button>
        <button onclick="changeDay('화')" id="btn-화" class="day-btn flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-2xl bg-white shadow-sm font-bold text-lg">화</button>
        <button onclick="changeDay('수')" id="btn-수" class="day-btn flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-2xl bg-white shadow-sm font-bold text-lg">수</button>
        <button onclick="changeDay('목')" id="btn-목" class="day-btn flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-2xl bg-white shadow-sm font-bold text-lg">목</button>
        <button onclick="changeDay('금')" id="btn-금" class="day-btn flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-2xl bg-white shadow-sm font-bold text-lg">금</button>
    </div>

    <div id="timetable-list" class="w-full max-w-md space-y-4">
        <!-- 시간표 데이터 로드 영역 -->
    </div>

    <div class="mt-10 text-gray-400 text-xs text-center leading-relaxed">
        구글 스프레드시트와 실시간 연동 중입니다.<br>
        45분 수업, 50분 점심 기준입니다.
    </div>

    <script>
        const SHEET_ID = '1vScVFk_W8kiRU2pQhCIhr32LNR51AZKunJke7RlOdao'; 
        const SHEET_NAME = '시간표 위젯 정보 확장 및 UI 개선'; 
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        const PERIOD_TIMES = [
            { period: 1, start: "09:00", end: "09:45" },
            { period: 2, start: "09:55", end: "10:40" },
            { period: 3, start: "10:50", end: "11:35" },
            { period: 4, start: "11:45", end: "12:30" },
            { period: 5, start: "13:20", end: "14:05" },
            { period: 6, start: "14:15", end: "15:00" },
            { period: 7, start: "15:10", end: "15:55" }
        ];

        let masterData = [];
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        let selectedDay = days[new Date().getDay()];
        if (selectedDay === '일' || selectedDay === '토') selectedDay = '월';

        window.onload = async () => {
            updateDateUI();
            await loadSheetData();
            renderTimetable();
            setInterval(() => { updateDateUI(); renderTimetable(); }, 60000);
        };

        function updateDateUI() {
            const now = new Date();
            document.getElementById('current-date-display').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${dayName(now.getDay())}요일)`;
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${selectedDay}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function dayName(index) { return days[index]; }

        async function loadSheetData() {
            try {
                const response = await fetch(JSON_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                masterData = json.table.rows.map(row => ({
                    day: row.c[0]?.v,
                    period: row.c[1]?.v,
                    subject: row.c[2]?.v,
                    teacher: row.c[3]?.v,
                    location: row.c[4]?.v
                }));
                document.getElementById('update-timestamp').innerText = `LIVE`;
                document.getElementById('status-dot').className = "inline-block w-2 h-2 rounded-full bg-green-500 mb-1";
            } catch (e) {
                document.getElementById('update-timestamp').innerText = `오류`;
                document.getElementById('status-dot').className = "inline-block w-2 h-2 rounded-full bg-red-500 mb-1";
            }
        }

        function getCurrentPeriod() {
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            for (const item of PERIOD_TIMES) {
                const [sh, sm] = item.start.split(':').map(Number);
                const [eh, em] = item.end.split(':').map(Number);
                if (current >= sh * 60 + sm && current <= eh * 60 + em) return item.period;
            }
            return null;
        }

        function renderTimetable() {
            const container = document.getElementById('timetable-list');
            container.innerHTML = "";
            const filtered = masterData.filter(item => item.day === selectedDay);
            const currentP = (selectedDay === days[new Date().getDay()]) ? getCurrentPeriod() : null;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="glass p-12 text-center text-gray-500">수업 데이터가 없습니다.</div>`;
                return;
            }

            filtered.sort((a, b) => a.period - b.period).forEach(item => {
                const active = item.period === currentP;
                const time = PERIOD_TIMES.find(t => t.period === item.period);
                const card = document.createElement('div');
                card.className = `period-card glass p-5 flex items-center shadow-sm ${active ? 'active-now' : ''}`;
                card.innerHTML = `
                    <div class="w-14 flex flex-col items-center justify-center border-r border-gray-200 mr-5">
                        <span class="text-2xl font-black ${active ? 'text-blue-600' : 'text-gray-400'}">${item.period}</span>
                        <span class="text-[10px] text-gray-400 font-bold uppercase mt-1">교시</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between">
                            <h3 class="text-lg font-bold text-gray-800">${item.subject || '-'}</h3>
                            ${active ? '<span class="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded-full pulse">● 진행 중</span>' : ''}
                        </div>
                        <div class="text-xs text-gray-500 mt-1">👤 ${item.teacher || '-'} | 📍 ${item.location || '-'}</div>
                        ${time ? `<div class="text-[10px] text-gray-300 mt-2 font-mono">${time.start} ~ ${time.end}</div>` : ''}
                    </div>`;
                container.appendChild(card);
            });
        }

        function changeDay(day) { selectedDay = day; updateDateUI(); renderTimetable(); }
    </script>
</body>
</html>
